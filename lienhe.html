<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ | Khoa CNTT - HUIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="py-5">
        <div class="container">
            <h1 class="fw-bold mb-5 reveal text-center">Liên hệ với chúng tôi</h1>

            <div class="row">
                <div class="col-lg-5 mb-4 reveal">
                    <div class="glass-card p-4 h-100">
                        <h4 class="fw-bold mb-4">Thông tin liên hệ</h4>
                        <div class="d-flex mb-3">
                            <div class="bg-primary-subtle text-primary rounded-circle p-3 me-3" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold mb-1">Địa chỉ</h6>
                                <p class="small text-secondary mb-0">140 Lê Trọng Tấn, P. Tây Thạnh, Q. Tân Phú, TP.HCM</p>
                            </div>
                        </div>
                        <div class="d-flex mb-3">
                            <div class="bg-success-subtle text-success rounded-circle p-3 me-3" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold mb-1">Điện thoại</h6>
                                <p class="small text-secondary mb-0">(028) 38161673 - Ext: 123</p>
                            </div>
                        </div>
                        <div class="d-flex mb-3">
                            <div class="bg-info-subtle text-info rounded-circle p-3 me-3" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold mb-1">Email</h6>
                                <p class="small text-secondary mb-0">kcntt@huit.edu.vn</p>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        <h6 class="fw-bold mb-3">Mạng xã hội</h6>
                        <div class="d-flex">
                            <a href="#" class="btn btn-outline-primary rounded-circle me-2 btn-interactive"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" class="btn btn-outline-danger rounded-circle me-2 btn-interactive"><i class="fab fa-youtube"></i></a>
                            <a href="#" class="btn btn-outline-info rounded-circle me-2 btn-interactive"><i class="fab fa-linkedin-in"></i></a>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7 mb-4 reveal" style="transition-delay: 0.2s;">
                    <div class="glass-card p-4">
                        <h4 class="fw-bold mb-4">Gửi tin nhắn cho chúng tôi</h4>
                        <form id="contact-form">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Họ và tên</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Số điện thoại</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Tiêu đề</label>
                                <input type="text" class="form-control" id="subject" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nội dung</label>
                                <textarea class="form-control" id="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 btn-interactive">Gửi tin nhắn</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-check-circle me-2"></i> Cảm ơn bạn! Tin nhắn đã được gửi thành công.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        $(document).ready(function() {
            $('#contact-form').on('submit', function(e) {
                e.preventDefault();
                
                // Basic Validation (Part 3.6)
                const email = $('#email').val();
                const phone = $('#phone').val();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                const phoneRegex = /^[0-9]{10,11}$/;

                if (!emailRegex.test(email)) {
                    alert('Vui lòng nhập email hợp lệ!');
                    return;
                }

                if (!phoneRegex.test(phone)) {
                    alert('Số điện thoại phải có từ 10-11 chữ số!');
                    return;
                }

                // Simulate success
                const toast = new bootstrap.Toast(document.getElementById('successToast'));
                toast.show();
                this.reset();
            });
        });
    </script>
</body>
</html>

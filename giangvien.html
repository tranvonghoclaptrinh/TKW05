<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đội ngũ Giảng viên | Khoa CNTT - HUIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        /* ==========================================================================
            OPTIMIZED: LECTURER DIRECTORY MODULE (LIGHT/DARK INTEGRATION)
           ========================================================================== */

        /* 1. Thiết lập cấu trúc thanh điều hướng dính (Sticky Aside) */
        aside .sticky-top {
            top: 100px;
            z-index: 10;
            transition: var(--transition-standard);
        }

        /* 2. Tối ưu hóa các trường nhập liệu (Input & Select) theo Glassmorphic */
        .id-lecturer-section .form-control,
        .id-lecturer-section .form-select {
            background-color: var(--glass-bg) !important;
            border: 1px solid var(--glass-border) !important;
            /* Thay --border-color bằng --glass-border để sáng rõ trong tối */
            color: var(--text-main) !important;
            border-radius: 8px;
            transition: var(--transition-standard);
        }

        .id-lecturer-section .form-control:focus,
        .id-lecturer-section .form-select:focus {
            background-color: var(--surface-color) !important;
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 3px var(--primary-light) !important;
        }

        /* Đổi màu chữ gợi ý (Placeholder) */
        .id-lecturer-section .form-control::placeholder {
            color: var(--text-secondary) !important;
            opacity: 0.7;
        }

        /* 3. Tối ưu hóa các nhãn text và bộ chọn Checkbox */
        .id-lecturer-section .form-check-label {
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .id-lecturer-section .form-check-input {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        .id-lecturer-section .form-check-input:checked {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }

        /* --------------------------------------------------------------------------
            INTEGRATED: MODULE SEARCH LECTURER COMPONENT (FIXED LIGHT/DARK)
           -------------------------------------------------------------------------- */
        .custom-search-container .search-label-theme {
            color: var(--text-main) !important;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .custom-search-container .search-addon-theme,
        .custom-search-container .search-input-theme {
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
            background: transparent !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-search-container .search-input-theme::placeholder {
            color: var(--text-secondary) !important;
            opacity: 0.7;
        }

        .custom-search-container .search-icon-theme {
            color: var(--text-secondary) !important;
            transition: color 0.3s ease;
        }

        .custom-search-container .search-input-theme:focus {
            box-shadow: none !important;
            border-color: var(--primary-color) !important;
        }

        .custom-search-container .search-input-theme:focus+.search-addon-theme {
            border-color: var(--primary-color) !important;
        }

        /* 4. Thẻ thông tin giảng viên (Lecturer Card) */
        .lecturer-card {
            color: var(--text-main);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1),
                box-shadow 0.3s ease,
                border-color 0.3s ease !important;
        }

        .lecturer-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary-color) !important;
            box-shadow: 0 12px 30px var(--shadow-color) !important;
        }

        .lecturer-card .text-muted,
        .lecturer-card .text-secondary {
            color: var(--text-secondary) !important;
        }

        /* 5. Tối ưu hóa hoàn toàn cấu trúc Modal trong Dark Mode */
        .id-lecturer-modal .modal-content {
            background: var(--glass-bg) !important;
            backdrop-filter: var(--glass-blur) !important;
            -webkit-backdrop-filter: var(--glass-blur) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            color: var(--text-main) !important;
        }

        .id-lecturer-modal .modal-header,
        .id-lecturer-modal .modal-footer {
            border-color: var(--glass-border) !important;
        }

        .id-lecturer-modal .btn-close {
            filter: var(--close-btn-filter, none);
            transition: var(--transition-standard);
        }

        /* ==========================================================================
            SPECIFIC DARK MODE REFINE (Kích hoạt tự động qua data-theme="dark")
           ========================================================================== */
        [data-theme="dark"] .id-lecturer-section,
        [data-theme="dark"] .id-lecturer-modal {
            --close-btn-filter: invert(1) grayscale(1) brightness(2);
            --custom-neon: #5EA2FF;
        }

        [data-theme="dark"] .id-lecturer-section h1,
        [data-theme="dark"] .id-lecturer-section h5,
        [data-theme="dark"] .id-lecturer-section .text-primary,
        [data-theme="dark"] .id-lecturer-modal .text-primary,
        [data-theme="dark"] .custom-search-container .search-label-theme,
        [data-theme="dark"] .custom-search-container .search-icon-theme {
            color: var(--custom-neon) !important;
            /* Ép toàn bộ tiêu đề, nhãn và icon search sang màu xanh Neon trong tối */
        }

        [data-theme="dark"] .custom-search-container .search-addon-theme,
        [data-theme="dark"] .custom-search-container .search-input-theme {
            border-color: rgba(94, 162, 255, 0.25) !important;
            /* Viền xanh trong suốt tinh tế */
            background: rgba(16, 27, 44, 0.4) !important;
        }

        /* Tối ưu hóa thẻ Select Options trên trình duyệt nền tối */
        [data-theme="dark"] .id-lecturer-section .form-select option {
            background-color: #101b2c !important;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="py-5 id-lecturer-section">
        <div class="container">
            <h1 class="fw-bold mb-5 reveal text-center">Đội ngũ Giảng viên</h1>

            <div class="row">
                <!-- Sidebar Filter (E-commerce Style) -->
                <aside class="col-lg-3 mb-4">
                    <div class="glass-card p-4 sticky-top">
                        <h5 class="fw-bold mb-4"><i class="fas fa-filter me-2"></i>Bộ lọc</h5>

                        <div class="mb-4 custom-search-container">
                            <label class="form-label fw-bold small text-uppercase search-label-theme"
                                for="lecturer-search">Tìm kiếm giảng viên</label>

                            <div class="input-group">
                                <span class="input-group-text bg-transparent search-addon-theme border-end-0">
                                    <i class="fas fa-search search-icon-theme"></i>
                                </span>
                                <input type="text" id="lecturer-search"
                                    class="form-control search-input-theme border-start-0"
                                    placeholder="Nhập tên hoặc bộ môn...">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Học vị</label>
                            <select id="filter-degree" class="form-select">
                                <option value="all">Tất cả học vị</option>
                                <option value="TS">Tiến sĩ / Phó Giáo sư</option>
                                <option value="ThS">Thạc sĩ</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Bộ môn</label>
                            <div id="dept-checkboxes">
                                <div class="form-check mb-2">
                                    <input class="form-check-input filter-dept" type="checkbox" value="CNPM"
                                        id="dept-cnpm" checked>
                                    <label class="form-check-label" for="dept-cnpm">Công nghệ phần mềm</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input filter-dept" type="checkbox" value="HTTT"
                                        id="dept-httt" checked>
                                    <label class="form-check-label" for="dept-httt">Hệ thống thông tin</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input filter-dept" type="checkbox" value="KHMT"
                                        id="dept-khmt" checked>
                                    <label class="form-check-label" for="dept-khmt">Khoa học máy tính</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input filter-dept" type="checkbox" value="MMT"
                                        id="dept-mmt" checked>
                                    <label class="form-check-label" for="dept-mmt">Mạng máy tính & ANTT</label>
                                </div>
                            </div>
                        </div>

                        <button id="reset-filters" class="btn btn-outline-secondary w-100 btn-interactive"><i
                                class="fas fa-undo me-2"></i>Đặt lại bộ lọc</button>
                    </div>
                </aside>

                <!-- Lecturer Grid -->
                <div class="col-lg-9">
                    <div class="row g-4" id="lecturer-grid">
                        <!-- Render động qua JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Profile Modal Chi tiết Giảng viên -->
    <div class="modal fade id-lecturer-modal" id="lecturerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" id="modal-lecturer-content">
                <!-- Nội dung chi tiết load động -->
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
        // DATA MATRIX CHUẨN: Toàn bộ Ban Giám khoa và Trưởng/Phó Bộ môn Khoa CNTT - HUIT
        const lecturers = [
            { id: 1, name: "ThS. Nguyễn Hiếu Nhu", degree: "ThS", position: "Phó Trưởng khoa phụ trách", dept: "CNPM", email: "nhunh@huit.edu.vn", phone: "(028) 38161673 - Ext: 111", office: "Văn phòng Khoa - Lầu 2 Nhà B", research: "Kiến trúc phần mềm hướng dịch vụ (SOA), Quản lý dự án phần mềm Agile/Scrum", image: "https://placehold.co/300x340?text=ThS+Nguyen+Hieu+Nhu" },
            { id: 2, name: "ThS. Thân Thị Ngọc Tóc", degree: "ThS", position: "Phó Trưởng khoa", dept: "HTTT", email: "tocttn@huit.edu.vn", phone: "(028) 38161673 - Ext: 112", office: "Văn phòng Khoa - Lầu 2 Nhà B", research: "Hệ quản trị cơ sở dữ liệu lớn (NoSQL), Hoạch định tài nguyên doanh nghiệp ERP", image: "https://placehold.co/300x340?text=ThS+Than+Thi+Ngoc+Toc" },
            { id: 3, name: "ThS. Phạm An Bình", degree: "ThS", position: "Trưởng Bộ môn", dept: "CNPM", email: "binhpa@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn CNPM", research: "Thiết kế mẫu (Design Patterns), Lập trình kiểm thử nâng cao, Thiết kế UI/UX", image: "https://placehold.co/300x340?text=ThS+Pham+An+Binh" },
            { id: 4, name: "ThS. Lê Thành Thanh", degree: "ThS", position: "Phó Trưởng Bộ môn", dept: "CNPM", email: "thanhlt@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn CNPM", research: "Phát triển hệ thống Web mã nguồn mở, Công nghệ Java/Spring Framework", image: "https://placehold.co/300x340?text=ThS+Le+Thanh+Thanh" },
            { id: 5, name: "ThS. Nguyễn Võ Thúy Thanh", degree: "ThS", position: "Trưởng Bộ môn", dept: "HTTT", email: "thanhnvt@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn HTTT", research: "Phân tích và thiết kế hệ thống thông tin, Kho dữ liệu (Data Warehouse)", image: "https://placehold.co/300x340?text=ThS+Nguyen+Vo+Thuy+Thanh" },
            { id: 6, name: "ThS. Lê Thị Kim Ngân", degree: "ThS", position: "Phó Trưởng Bộ môn", dept: "HTTT", email: "nganltk@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn HTTT", research: "Hệ thống thông tin quản lý (MIS), Thương mại điện tử và Bảo mật dữ liệu", image: "https://placehold.co/300x340?text=ThS+Le+Thi+Kim+Ngan" },
            { id: 7, name: "TS. Hoàng Bảo Hùng", degree: "TS", position: "Trưởng Bộ môn", dept: "KHMT", email: "hunghb@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn KHMT", research: "Trí tuệ nhân tạo (AI), Học máy (Machine Learning), Hệ thống xử lý ngôn ngữ tự nhiên", image: "https://placehold.co/300x340?text=TS+Hoang+Bao+Hung" },
            { id: 8, name: "TS. Nguyễn Phong Trung", degree: "TS", position: "Phó Trưởng Bộ môn", dept: "KHMT", email: "trungnp@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn KHMT", research: "Thị giác máy tính (Computer Vision), Xử lý ảnh y khoa, Học sâu đồ thị", image: "https://placehold.co/300x340?text=TS+Nguyen+Phong+Trung" },
            { id: 9, name: "ThS. Nguyễn Minh Tiến", degree: "ThS", position: "Trưởng Bộ môn", dept: "MMT", email: "tiennm@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn Mạng", research: "An ninh mạng và mã hóa dữ liệu, Thiết kế kiến trúc mạng doanh nghiệp lớn", image: "https://placehold.co/300x340?text=ThS+Nguyen+Minh+Tien" },
            { id: 10, name: "ThS. Đặng Lê Bảo Chương", degree: "ThS", position: "Phó Trưởng Bộ môn", dept: "MMT", email: "chuongdlb@huit.edu.vn", phone: "(028) 38161673", office: "Văn phòng Bộ môn Mạng", research: "Điện toán đám mây (Cloud Computing), Giám sát và ứng cứu sự cố hệ thống ATTT", image: "https://placehold.co/300x340?text=ThS+Dang+Le+Bao+Chuong" }
        ];

        const deptNames = {
            "CNPM": "Công nghệ phần mềm",
            "HTTT": "Hệ thống thông tin",
            "KHMT": "Khoa học máy tính",
            "MMT": "Mạng máy tính & ANTT"
        };

        // Hàm loại bỏ dấu tiếng Việt chuyên sâu giúp bộ lọc tìm kiếm chính xác (Search Algorithm Enhancement)
        function removeVietnameseTones(str) {
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|á|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ạ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            // Loại bỏ các ký tự dấu phụ kết hợp
            str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return str.toLowerCase();
        }

        function renderLecturers(data) {
            const grid = $('#lecturer-grid');
            grid.empty();

            if (data.length === 0) {
                grid.append(`
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-search-minus fa-3x text-muted mb-3"></i>
                        <p class="text-secondary fw-semibold">Không tìm thấy nhân sự giảng viên phù hợp.</p>
                    </div>
                `);
                return;
            }

            data.forEach(l => {
                grid.append(`
                    <div class="col-md-6 col-lg-4 reveal">
                        <div class="glass-card lecturer-card h-100 overflow-hidden d-flex flex-column">
                            <div class="position-relative overflow-hidden" style="height: 250px;">
                                <img src="${l.image}" alt="${l.name}" class="w-100 h-100 object-fit-cover transition-standard">
                                <span class="position-absolute bottom-0 start-0 m-3 badge bg-primary border border-light shadow-sm">${deptNames[l.dept]}</span>
                            </div>
                            <div class="p-4 flex-grow-1 d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="fw-bold mb-1 card-lecturer-title">${l.name}</h5>
                                    <p class="text-primary small fw-semibold mb-3">${l.position}</p>
                                    <p class="small text-secondary mb-2"><i class="fas fa-envelope me-2 text-muted"></i>${l.email}</p>
                                    <p class="small text-secondary mb-0"><i class="fas fa-building me-2 text-muted"></i>${l.office}</p>
                                </div>
                                <button class="btn btn-primary btn-sm w-100 mt-4 btn-interactive" onclick="showLecturerDetail(${l.id})">
                                    <i class="fas fa-info-circle me-1"></i> Xem thông tin
                                </button>
                            </div>
                        </div>
                    </div>
                `);
            });
            // Áp dụng lớp kích hoạt hiệu ứng reveal
            setTimeout(() => { $('.reveal').addClass('active'); }, 50);
        }

        function showLecturerDetail(id) {
            const l = lecturers.find(item => item.id === id);
            if (!l) return;

            const modalBody = $('#modal-lecturer-content');
            modalBody.html(`
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 pt-0">
                    <div class="row">
                        <div class="col-md-4 text-center mb-4 mb-md-0">
                            <img src="${l.image}" alt="${l.name}" class="img-fluid rounded-3 shadow-sm border border-secondary" style="max-height: 280px; object-fit: cover;">
                        </div>
                        <div class="col-md-8">
                            <h3 class="fw-bold mb-1 text-primary">${l.name}</h3>
                            <p class="text-secondary fw-semibold mb-3">${l.position} - Bộ môn ${deptNames[l.dept]}</p>
                            
                            <hr class="border-color my-3" style="opacity:0.15;">
                            
                            <div class="row g-3">
                                <div class="col-sm-6">
                                    <p class="small text-secondary mb-1"><i class="fas fa-id-card me-2 text-primary"></i><strong>Học vị:</strong> ${l.degree === 'TS' ? 'Tiến sĩ' : 'Thạc sĩ'}</p>
                                </div>
                                <div class="col-sm-6">
                                    <p class="small text-secondary mb-1"><i class="fas fa-envelope me-2 text-primary"></i><strong>Email:</strong> ${l.email}</p>
                                </div>
                                <div class="col-sm-6">
                                    <p class="small text-secondary mb-1"><i class="fas fa-phone me-2 text-primary"></i><strong>Điện thoại:</strong> ${l.phone}</p>
                                </div>
                                <div class="col-sm-6">
                                    <p class="small text-secondary mb-1"><i class="fas fa-map-marker-alt me-2 text-primary"></i><strong>Văn phòng:</strong> ${l.office}</p>
                                </div>
                            </div>

                            <div class="mt-4 p-3 rounded-3" style="background: rgba(255,255,255,0.02); border: 1px solid var(--border-color);">
                                <h6 class="fw-bold text-primary mb-2"><i class="fas fa-flask me-2"></i>Hướng nghiên cứu chuyên sâu:</h6>
                                <p class="small text-secondary mb-0" style="line-height:1.6;">${l.research}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `);
            const modal = new bootstrap.Modal(document.getElementById('lecturerModal'));
            modal.show();
        }

        function applyFilters() {
            const searchText = removeVietnameseTones($('#lecturer-search').val());
            const degree = $('#filter-degree').val();
            const selectedDepts = $('.filter-dept:checked').map(function () { return this.value; }).get();

            const filtered = lecturers.filter(l => {
                const targetName = removeVietnameseTones(l.name);
                const targetPosition = removeVietnameseTones(l.position);
                const matchesSearch = targetName.includes(searchText) || targetPosition.includes(searchText);

                const matchesDegree = degree === 'all' || l.degree === degree;
                const matchesDept = selectedDepts.includes(l.dept);

                return matchesSearch && matchesDegree && matchesDept;
            });

            renderLecturers(filtered);
        }

        $(document).ready(function () {
            // Khởi tạo render lần đầu
            renderLecturers(lecturers);

            // Gán các sự kiện tương tác
            $('#lecturer-search').on('keyup', applyFilters);
            $('.filter-dept').on('change', applyFilters);
            $('#filter-degree').on('change', applyFilters);

            $('#reset-filters').click(function () {
                $('#lecturer-search').val('');
                $('#filter-degree').val('all');
                $('.filter-dept').prop('checked', true);
                renderLecturers(lecturers);
            });
        });
    </script>
</body>

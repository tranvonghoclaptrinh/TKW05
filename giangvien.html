<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đội ngũ Giảng viên | Khoa CNTT - HUIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="py-5">
        <div class="container">
            <h1 class="fw-bold mb-5 reveal text-center">Đội ngũ Giảng viên</h1>

            <div class="row">
                <!-- Sidebar Filter (E-commerce style) -->
                <aside class="col-lg-3 mb-4">
                    <div class="glass-card p-4 sticky-top" style="top: 100px; z-index: 100;">
                        <h5 class="fw-bold mb-4"><i class="fas fa-filter me-2"></i>Bộ lọc</h5>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Tìm kiếm</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                                <input type="text" id="lecturer-search" class="form-control border-start-0" placeholder="Tên giảng viên...">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Bộ môn</label>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-dept" type="checkbox" value="HTTT" id="dept1" checked>
                                <label class="form-check-label small" for="dept1">Hệ thống thông tin</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-dept" type="checkbox" value="KHMT" id="dept2" checked>
                                <label class="form-check-label small" for="dept2">Khoa học máy tính</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-dept" type="checkbox" value="CNPM" id="dept3" checked>
                                <label class="form-check-label small" for="dept3">Công nghệ phần mềm</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-dept" type="checkbox" value="ANMT" id="dept4" checked>
                                <label class="form-check-label small" for="dept4">An ninh mạng</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Học hàm/Học vị</label>
                            <select class="form-select form-select-sm" id="filter-degree">
                                <option value="all">Tất cả</option>
                                <option value="GS">Giáo sư</option>
                                <option value="PGS">Phó Giáo sư</option>
                                <option value="TS">Tiến sĩ</option>
                                <option value="ThS">Thạc sĩ</option>
                            </select>
                        </div>

                        <button class="btn btn-outline-primary btn-sm w-100 rounded-pill btn-interactive" id="reset-filters">Xóa bộ lọc</button>
                    </div>
                </aside>

                <!-- Lecturer Grid -->
                <div class="col-lg-9">
                    <div class="row" id="lecturer-container">
                        <!-- Data will be injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Profile Modal -->
    <div class="modal fade" id="lecturerModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 glass-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modal-name">Chi tiết Giảng viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="modal-body">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Mock Data Validation Matrix (Part 6.3)
        const lecturers = [
            { id: 1, name: "Nguyễn Văn A", degree: "TS", dept: "HTTT", img: "https://placehold.co/300x400?text=A", email: "anv@huit.edu.vn", bio: "Chuyên gia HTTT với 15 năm kinh nghiệm." },
            { id: 2, name: "Trần Thị B", degree: "ThS", dept: "KHMT", img: "https://placehold.co/300x400?text=B", email: "btt@huit.edu.vn", bio: "Giảng dạy các môn về cấu trúc dữ liệu." },
            { id: 3, name: "Lê Văn C", degree: "TS", dept: "CNPM", img: "https://placehold.co/300x400?text=C", email: "clv@huit.edu.vn", bio: "Nghiên cứu về quy trình phát triển phần mềm." },
            { id: 4, name: "Phạm Minh D", degree: "PGS", dept: "ANMT", img: "https://placehold.co/300x400?text=D", email: "dpm@huit.edu.vn", bio: "Chuyên gia an ninh mạng và mật mã học." },
            { id: 5, name: "Hoàng Thị E", degree: "ThS", dept: "HTTT", img: "https://placehold.co/300x400?text=E", email: "eht@huit.edu.vn", bio: "Quản trị cơ sở dữ liệu và Big Data." },
            { id: 6, name: "Vũ Văn F", degree: "TS", dept: "KHMT", img: "https://placehold.co/300x400?text=F", email: "fvv@huit.edu.vn", bio: "Xử lý ảnh và thị giác máy tính." }
        ];

        function renderLecturers(data) {
            const container = $('#lecturer-container');
            container.empty();
            
            if(data.length === 0) {
                container.append('<div class="col-12 text-center py-5"><p class="text-muted">Không tìm thấy giảng viên phù hợp.</p></div>');
                return;
            }

            data.forEach((l, index) => {
                const card = `
                    <div class="col-md-4 mb-4 lecturer-card reveal" style="transition-delay: ${index * 0.1}s">
                        <div class="glass-card h-100 overflow-hidden" onclick="showProfile(${l.id})">
                            <img src="${l.img}" class="card-img-top" alt="${l.name}" style="height: 250px; object-fit: cover;">
                            <div class="card-body p-3">
                                <span class="badge bg-primary-subtle text-primary mb-2">${l.degree}</span>
                                <h6 class="fw-bold mb-1">${l.name}</h6>
                                <p class="small text-secondary mb-2"><i class="fas fa-building me-1"></i> ${l.dept}</p>
                                <p class="small text-muted text-truncate mb-0">${l.bio}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.append(card);
            });

            // Re-trigger reveal animations for new elements
            $('.reveal').addClass('active');
        }

        function showProfile(id) {
            const l = lecturers.find(item => item.id === id);
            $('#modal-name').text(`${l.degree}. ${l.name}`);
            $('#modal-body').html(`
                <div class="row">
                    <div class="col-md-4">
                        <img src="${l.img}" class="img-fluid rounded shadow-sm" alt="${l.name}">
                    </div>
                    <div class="col-md-8">
                        <h5 class="fw-bold text-primary mb-3">Thông tin chi tiết</h5>
                        <p><strong>Bộ môn:</strong> ${l.dept}</p>
                        <p><strong>Email:</strong> ${l.email}</p>
                        <p><strong>Tiểu sử:</strong> ${l.bio}</p>
                        <hr>
                        <h6 class="fw-bold">Các hướng nghiên cứu chính:</h6>
                        <ul>
                            <li>Nghiên cứu ứng dụng trong ${l.dept}</li>
                            <li>Phát triển hệ thống thông minh</li>
                            <li>Tối ưu hóa quy trình</li>
                        </ul>
                    </div>
                </div>
            `);
            const modal = new bootstrap.Modal(document.getElementById('lecturerModal'));
            modal.show();
        }

        function applyFilters() {
            const searchText = $('#lecturer-search').val().toLowerCase();
            const degree = $('#filter-degree').val();
            const selectedDepts = $('.filter-dept:checked').map(function() { return this.value; }).get();

            const filtered = lecturers.filter(l => {
                const matchesSearch = l.name.toLowerCase().includes(searchText);
                const matchesDegree = degree === 'all' || l.degree === degree;
                const matchesDept = selectedDepts.includes(l.dept);
                return matchesSearch && matchesDegree && matchesDept;
            });

            renderLecturers(filtered);
        }

        $(document).ready(function() {
            renderLecturers(lecturers);

            // Live Search (Part 3.3)
            $('#lecturer-search').on('keyup', applyFilters);
            $('.filter-dept').on('change', applyFilters);
            $('#filter-degree').on('change', applyFilters);
            
            $('#reset-filters').click(function() {
                $('#lecturer-search').val('');
                $('#filter-degree').val('all');
                $('.filter-dept').prop('checked', true);
                renderLecturers(lecturers);
            });
        });
    </script>
</body>
</html>
